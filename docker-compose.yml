services:
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      # Mount any local folder as the workspace.
      # Windows: use absolute path or relative with forward slashes.
      - ./workspace:/app/workspace
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WORKSPACE_DIR=/app/workspace
    restart: unless-stopped
